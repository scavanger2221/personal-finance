services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-finance-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - APP_NAME=${APP_NAME:-Personal Finance}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=personal_finance
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    networks:
      - app-network
    depends_on:
      db:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: personal-finance-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: personal-finance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.db:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
